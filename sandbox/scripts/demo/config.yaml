app:
    name: sandbox_demo
    environment: dev
    logger: default

logging:
    file_output_format: text
    async_mode: false
    formatters:
        demo_text:
            format: '[%(asctime)s] [%(levelname)-5s] [%(name)s] %(message)s'
            datefmt: '%Y-%m-%d %H:%M:%S'
    handlers:
        console:
            formatter: demo_text
            level: INFO
        file:
            formatter: demo_text
            level: INFO
            filename: sandbox/scripts/demo/logs/demo.log
    loggers:
        default:
            level: INFO
            handlers: [console, file]
            propagate: false
        pkg_infra.session:
            level: DEBUG
            handlers: [console, file]
            propagate: false

integrations:
    ontograph:
        settings:
            api_url: https://demo.ontograph.local
            timeout: 45
    corneto:
        settings:
            network_path: sandbox-network
